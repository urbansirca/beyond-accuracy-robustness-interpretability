# Gradient × Input (captum.InputXGradient).
# Works on all six models — preferred fallback when LRP isn't supported
# (BrainOmni, NeuroRVQ).

extends: _base.yaml

method: ixg

# All registered models are supported.
models:
  - LaBraM
  - REVE
  - NeuroRVQ
  - CBraMod
  - BrainOmni
  - EEGNet

# Seed class for the backward pass: 'gt' (ground truth) or 'predicted'.
target: gt

# BrainOmni only: when true, the IxG forward bypasses the VQ codebook lookup
# (continuous F.normalize features feed straight into the LM blocks). Gradients
# then flow as the true derivative of the actual forward pass — no straight-
# through estimator. Only meaningful for checkpoints fine-tuned with the same
# flag (configs/train/skip_tokenizer.yaml).
skip_brainomni_tokenizer: false

# Filter to top-(1 - q) most confident *correct* predictions before averaging.
confidence_quantile: 0.75

# Per-eval augmentation tags (see data/perturbations/* for the catalog).
augmentations:
  - null
  # - pink_noise_0db
  # - white_noise_0db
  # - dropout_region_primary
